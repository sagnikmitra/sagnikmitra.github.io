<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perccent — DIT Platform (Demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css?family=Google+Sans:400,500,600,700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..500,0..1,0&display=swap" rel="stylesheet" />
<style>
  :root{
    --brand:#0047BD;  --chip:#EBF1FD;  --deep:#003091;
    --ink:#0A1F44;    --muted:#6B7280; --hint:#9CA3AF;  --grey-btn-text:#374151;
    --page:#F5F7FA;   --card:#FFFFFF;  --hair:#EEF0F4;  --input:#E5E8EE;
    --inset:#F8FAFE;  --track:#F1F4F8; --grey-btn:#F4F5F7;
    --ok:#299959;     --ok-tint:#E7F5EC;  --ok-pill-fg:#136B36; --ok-pill-bg:#EAF6EE;
    --err:#C9342B;    --err-tint:#FCEBEB; --err-pill-fg:#A41C1C;
    --warn:#C2772B;   --warn-tint:#FFF4E5;--warn-pill-fg:#8A4B00;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Google Sans','Product Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--page); color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  button, input, select, textarea{font-family:inherit;}
  button{cursor:pointer;}
  svg{width:16px;height:16px;flex:none;}
  .material-symbols-rounded{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;display:inline-flex;white-space:nowrap;direction:ltr;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;flex:none;}
  .mi-fill{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
  .app{display:grid; grid-template-columns:232px 1fr 340px; height:100vh; min-width:1200px;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{background:#fff; border-right:1px solid var(--hair); display:flex; flex-direction:column; padding:18px 0;}
  .sidebar .logo{padding:0 20px 18px; }
  .sidebar .logo img{height:26px;}
  .nav-item{display:flex; align-items:center; gap:11px; margin:2px 12px; padding:10px 12px; border-radius:12px;
    font-size:13.5px; font-weight:500; color:var(--muted); cursor:pointer;}
  .nav-item svg{width:18px; height:18px; flex:none;}
  .nav-item:hover{background:var(--inset);}
  .nav-item.on{background:var(--chip); color:var(--brand); font-weight:600;}
  .nav-spacer{flex:1;}
  .distributor{margin:12px; padding:12px; border-top:1px solid var(--hair); display:flex; align-items:center; gap:10px;}
  .distributor .av{width:36px;height:36px;border-radius:999px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex:none;}
  .distributor .meta{flex:1; min-width:0;}
  .distributor .meta .n{font-size:13px; font-weight:600; color:var(--ink);}
  .distributor .meta .r{font-size:11px; color:var(--hint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .distributor .lg{color:var(--hint); background:none; border:none; padding:4px; display:flex;}
  .distributor .lg svg{width:16px;height:16px;}

  /* ---------- CENTER (topbar + main) ---------- */
  .center{display:flex; flex-direction:column; min-width:0; height:100vh;}
  .topbar{height:64px; flex:none; background:#fff; border-bottom:1px solid var(--hair);
    display:flex; align-items:center; gap:14px; padding:0 22px;}
  .search{flex:1; max-width:420px; position:relative;}
  .search svg{position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--brand);}
  .search input{width:100%; border:1px solid var(--hair); border-radius:14px; background:#fff; padding:10px 14px 10px 40px;
    font-size:14px; color:var(--ink); outline:none;}
  .search input:focus{border-color:var(--brand);}
  .topbar-spacer{flex:1;}
  .demo-btn{display:flex; align-items:center; gap:6px; background:var(--ink); color:#fff; border:none; border-radius:12px;
    padding:9px 13px; font-size:12.5px; font-weight:600;}
  .demo-btn svg{width:14px;height:14px;}
  .btn-primary{background:var(--brand); color:#fff; border:none; border-radius:12px; padding:10px 16px; font-size:13.5px; font-weight:600;
    display:flex; align-items:center; gap:7px;}
  .btn-primary svg{width:15px;height:15px;}
  .btn-primary:active{opacity:.9;}
  .btn-primary:disabled{background:var(--hint); cursor:default;}
  .topbar .av{width:34px;height:34px;border-radius:999px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;}

  .main-scroll{flex:1; min-height:0; overflow-y:auto; padding:24px 26px 60px;}
  .main-scroll::-webkit-scrollbar{width:8px;} .main-scroll::-webkit-scrollbar-thumb{background:#dfe3ea;border-radius:8px;}

  /* ---------- PHONE COLUMN ---------- */
  .phonecol{background:#EEF1F6; border-left:1px solid var(--hair); display:flex; flex-direction:column; align-items:center; padding:22px 16px; overflow-y:auto;}
  .phonecol .cap{font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--hint); display:flex; align-items:center; gap:7px; margin-bottom:14px;}
  .phonecol .dot{width:8px;height:8px;border-radius:999px;background:var(--hint);}
  .phonecol .dot.live{background:var(--brand); animation:pulse 1.3s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  .phone-bezel{width:300px; height:620px; background:#111318; border-radius:42px; padding:11px 8px; position:relative; box-shadow:0 24px 50px -20px rgba(10,31,68,.4); flex:none;}
  .phone-notch{position:absolute; top:20px; left:50%; transform:translateX(-50%); width:96px; height:22px; background:#111318; border-radius:16px; z-index:20;}
  .phone-screen{background:#fff; border-radius:32px; height:100%; overflow:hidden; position:relative; display:flex; flex-direction:column;}
  .phone-status{display:flex; align-items:center; justify-content:space-between; padding:13px 20px 2px; font-size:12px; font-weight:600; color:var(--ink); flex:none;}
  .phone-body{flex:1; min-height:0; overflow-y:auto; position:relative;}
  .phone-body::-webkit-scrollbar{width:0;}
  .phone-caption{font-size:11px; color:var(--muted); margin-top:12px; text-align:center; max-width:280px; line-height:1.4;}

  /* ---------- CARDS / PRIMITIVES ---------- */
  .card{background:#fff; border:1px solid var(--hair); border-radius:16px;}
  .p16{padding:16px;} .p20{padding:20px;}
  .kicker{font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:1px; color:var(--hint);}
  .h2tone{font-size:22px; font-weight:700; letter-spacing:-.3px;}
  .h2tone .b{color:var(--brand);} .h2tone .n{color:var(--ink);}
  .muted{color:var(--muted);} .hint{color:var(--hint);}
  .row{display:flex; align-items:center;}
  .btn{border:none; border-radius:14px; padding:13px 18px; font-size:14px; font-weight:600; display:inline-flex; align-items:center; justify-content:center; gap:8px;}
  .btn.primary{background:var(--brand); color:#fff;}
  .btn.primary:disabled{background:var(--hint); cursor:default;}
  .btn.primary:active{opacity:.9;}
  .btn.grey{background:var(--grey-btn); color:var(--grey-btn-text);}
  .btn.ghost{background:#fff; border:1px solid var(--input); color:var(--brand);}
  .btn.full{width:100%;}
  .btn svg{width:16px;height:16px;}
  .btn.sm{padding:8px 14px; font-size:13px; border-radius:12px;}
  .link{color:var(--brand); font-weight:600; background:none; border:none; padding:0; font-size:13px;}

  /* pills */
  .pill{display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:4px 11px; font-size:11.5px; font-weight:600; white-space:nowrap;}
  .pill .pdot{width:6px;height:6px;border-radius:999px;background:currentColor;}
  .pill.pulse .pdot{animation:pulse 1.2s infinite;}

  /* KPI */
  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  .kpi{background:#fff; border:1px solid var(--hair); border-radius:16px; padding:16px 18px;}
  .kpi .lbl{font-size:11.5px; font-weight:500; text-transform:uppercase; letter-spacing:.6px; color:var(--hint);}
  .kpi .num{font-size:28px; font-weight:700; color:var(--ink); margin-top:8px;}
  .kpi .sub{font-size:11px; color:var(--hint); margin-top:2px;}
  .dit-card{margin-top:14px; background:linear-gradient(135deg,#0047BD,#0038A0); border-radius:16px; padding:20px 22px;
    display:flex; align-items:center; justify-content:space-between; box-shadow:0 6px 18px rgba(0,48,145,.16);}
  .dit-card .t{color:#fff;}
  .dit-card .t .k{font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,.7);}
  .dit-card .t .m{font-size:17px; font-weight:700; margin-top:4px;}
  .dit-card .go{background:#fff; color:var(--brand); border:none; border-radius:12px; padding:11px 18px; font-weight:600; font-size:13.5px; display:flex; align-items:center; gap:7px;}
  .dit-card .go svg{width:15px;height:15px;}

  /* pipeline */
  .segtabs{display:inline-flex; background:var(--track); border-radius:12px; padding:4px; gap:2px;}
  .segtabs .s{padding:7px 14px; border-radius:9px; font-size:12.5px; font-weight:500; color:var(--muted); background:none; border:none;}
  .segtabs .s.on{background:#fff; color:var(--ink); font-weight:600; box-shadow:0 1px 3px rgba(10,31,68,.08);}
  .ptable{width:100%; border-collapse:collapse; margin-top:8px;}
  .ptable thead th{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--hint); text-align:left; padding:12px 12px; border-bottom:1px solid var(--hair);}
  .ptable tbody td{padding:13px 12px; border-bottom:1px solid var(--hair); font-size:13.5px; color:var(--ink); vertical-align:middle;}
  .ptable tbody tr:hover{background:var(--inset);}
  .ptable .nm{font-size:14px; font-weight:600; color:var(--ink);}
  .ptable .cline{font-size:12.5px; color:var(--muted);}
  .kebab{background:none; border:none; padding:6px; border-radius:8px; color:var(--hint);}
  .kebab:hover{background:var(--track);}
  .kebab svg{width:16px;height:16px;}
  .datefld{border:1px solid var(--input); border-radius:10px; padding:7px 10px; font-size:12.5px; color:var(--ink); outline:none;}
  .sortbtn{display:flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--input); border-radius:10px; padding:7px 12px; font-size:12.5px; font-weight:500; color:var(--muted);}
  .sortbtn svg{width:14px;height:14px;}

  /* ---------- WIZARD ---------- */
  .wiz-head{display:flex; align-items:center; gap:14px; margin-bottom:18px;}
  .backchip{width:32px;height:32px;border-radius:999px;background:#fff;border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;color:var(--brand);}
  .backchip svg{width:18px;height:18px;}
  .name-chip{background:var(--inset); border:1px solid var(--hair); border-radius:999px; padding:5px 12px; font-size:12.5px; font-weight:600; color:var(--ink);}
  .autosave{margin-left:auto; background:var(--chip); color:var(--brand); border-radius:999px; padding:5px 12px; font-size:11.5px; font-weight:600; display:flex; align-items:center; gap:6px;}
  .autosave .pdot{width:6px;height:6px;border-radius:999px;background:var(--brand);}
  .wiz-grid{display:grid; grid-template-columns:270px 1fr; gap:20px; align-items:start;}

  /* rail */
  .rail{background:#fff; border:1px solid var(--hair); border-radius:16px; padding:16px;}
  .rail .prog-top{display:flex; align-items:center; justify-content:space-between; font-size:11px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; color:var(--hint);}
  .rail .bar{height:5px; background:var(--track); border-radius:999px; margin:8px 0 14px; overflow:hidden;}
  .rail .bar > i{display:block; height:100%; background:var(--brand); border-radius:999px; transition:width .3s;}
  .rstep{display:flex; gap:11px; padding:7px 4px; border-radius:10px; cursor:default;}
  .rstep.clickable{cursor:pointer;} .rstep.clickable:hover{background:var(--inset);}
  .rstep .circ{width:24px;height:24px;border-radius:999px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;border:1.5px solid var(--input); color:var(--hint); background:#fff;}
  .rstep.done .circ{background:var(--brand); border-color:var(--brand); color:#fff;}
  .rstep.active .circ{background:var(--brand); border-color:var(--brand); color:#fff;}
  .rstep.active{background:var(--chip);}
  .rstep .circ svg{width:13px;height:13px;}
  .rstep .lbl{font-size:13px; font-weight:600; color:var(--ink);}
  .rstep.todo .lbl{color:var(--muted); font-weight:500;}
  .rstep .cap{font-size:10.5px; color:var(--hint); margin-top:1px;}
  .rsub{margin-left:34px; border-left:1.5px solid var(--hair); padding-left:0;}
  .rsub .rsubstep{display:flex; gap:9px; align-items:center; padding:5px 4px 5px 12px; margin-left:-1.5px; border-left:1.5px solid transparent;}
  .rsub .rsubstep .cdot{width:8px;height:8px;border-radius:999px;background:var(--input);flex:none;}
  .rsub .rsubstep.done .cdot{background:var(--brand);}
  .rsub .rsubstep.active{border-left-color:var(--brand);}
  .rsub .rsubstep.active .cdot{background:var(--brand);}
  .rsub .rsubstep .lbl{font-size:12px; font-weight:500; color:var(--muted);}
  .rsub .rsubstep.active .lbl, .rsub .rsubstep.done .lbl{color:var(--ink); font-weight:600;}

  /* step card */
  .stepcard{background:#fff; border:1px solid var(--hair); border-radius:16px; padding:24px 26px;}
  .step-eyebrow{font-size:12.5px; font-weight:600; color:var(--brand);}
  .step-title{font-size:24px; font-weight:700; letter-spacing:-.3px; margin:2px 0 2px;}
  .step-title .b{color:var(--brand);} .step-title .n{color:var(--ink);}
  .entered-by{float:right; background:var(--chip); color:var(--brand); border-radius:999px; padding:6px 12px; font-size:11.5px; font-weight:600; display:inline-flex; align-items:center; gap:6px;}
  .entered-by svg{width:13px;height:13px;}
  .step-sep{height:1px; background:var(--hair); margin:14px 0 20px;}
  .twocol{display:grid; grid-template-columns:1fr 1fr; gap:20px 24px;}
  .colhead{font-size:13px; font-weight:700; color:var(--ink); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--hair);}

  /* fields */
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:14px; font-weight:500; color:var(--ink); margin-bottom:8px;}
  .field label .req{color:var(--err); margin-left:2px;}
  .field label .lockicon{width:12px;height:12px;color:var(--hint);vertical-align:-1px;margin-left:4px;}
  .field input[type=text], .field input[type=email], .field input[type=number], .field input[type=date], .field select, .field textarea{
    width:100%; border:1px solid var(--input); border-radius:12px; padding:12px 14px; font-size:14.5px; color:var(--ink); background:#fff; outline:none;}
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--brand);}
  .field input::placeholder{color:var(--hint);}
  .field input:disabled, .field .locked{background:var(--inset); color:var(--muted); cursor:not-allowed;}
  .field .locked{display:flex; align-items:center; gap:8px; border:1px solid var(--input); border-radius:12px; padding:12px 14px; font-size:14.5px;}
  .field .locked svg{width:13px;height:13px;color:var(--hint);}
  .field .hinttext{font-size:12px; color:var(--brand); margin-top:6px; display:flex; align-items:center; gap:5px;}
  .field .hinttext svg{width:12px;height:12px;}
  .field .warntext{font-size:12px; color:var(--warn-pill-fg); margin-top:6px;}
  .field .errtext{font-size:12px; color:var(--err); font-weight:500; margin-top:6px;}
  .field input.invalid{border-color:var(--err);}
  .phone-input{display:flex; gap:10px;}
  .phone-input .cc{width:64px; text-align:center; border:1px solid var(--input); border-radius:12px; padding:12px 0; font-size:14.5px; color:var(--muted); background:var(--inset);}
  .phone-input input{flex:1;}

  /* segmented buttons (gender/nationality) */
  .segbtns{display:flex; gap:8px;}
  .segbtns .sb{flex:1; text-align:center; border:1px solid var(--input); border-radius:12px; padding:11px 0; font-size:13.5px; font-weight:500; color:var(--muted); background:#fff;}
  .segbtns .sb.on{border-color:var(--brand); background:var(--chip); color:var(--brand); font-weight:600;}

  /* checkbox / radio */
  .chk{display:flex; gap:11px; align-items:flex-start; margin-bottom:12px;}
  .chk .box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--input);flex:none;display:flex;align-items:center;justify-content:center;margin-top:1px;background:#fff;}
  .chk.on .box{background:var(--brand);border-color:var(--brand);}
  .chk .box svg{width:13px;height:13px;color:#fff;}
  .chk .txt{font-size:13px; color:var(--muted); line-height:1.5;}
  .radio-row{display:flex; align-items:center; justify-content:space-between; border:1px solid var(--input); border-radius:14px; padding:14px 16px; margin-bottom:10px; cursor:pointer;}
  .radio-row.on{border-color:var(--brand); background:var(--chip);}
  .radio-row .rlbl{font-size:14px; font-weight:500; color:var(--ink);}
  .radio-dot{width:20px;height:20px;border-radius:999px;border:2px solid var(--input);display:flex;align-items:center;justify-content:center;}
  .radio-row.on .radio-dot{border-color:var(--brand);}
  .radio-row.on .radio-dot::after{content:'';width:10px;height:10px;border-radius:999px;background:var(--brand);}

  /* inset panels */
  .inset{background:var(--inset); border:1px solid var(--hair); border-radius:16px; padding:18px;}
  .devotp{background:rgba(10,15,30,.72); color:#fff; border-radius:8px; padding:6px 10px; font-size:11.5px; font-weight:600; display:inline-flex; align-items:center; gap:6px; margin-top:10px;}
  .devotp svg{width:12px;height:12px;}

  /* OTP boxes */
  .otpwrap{display:flex; gap:8px;}
  .otpbox{width:44px;height:52px;border:1px solid var(--input);border-radius:12px;text-align:center;font-size:20px;font-weight:600;color:var(--ink);outline:none;background:#fff;}
  .otpbox:focus{border-color:var(--brand);}
  .otpbox.filled{border-color:var(--brand);}
  .otpbox.err{border-color:var(--err);}
  .otpbox.sm{width:36px;height:44px;font-size:17px;}
  .resend{font-size:12.5px; color:var(--muted); margin-top:10px;}
  .resend b{color:var(--brand);}

  /* footer */
  .stepfoot{display:flex; align-items:center; justify-content:space-between; margin-top:24px;}

  /* signature upload */
  .upload{border:1.5px dashed var(--input); border-radius:14px; padding:20px; text-align:center; cursor:pointer; color:var(--muted);}
  .upload:hover{border-color:var(--brand); background:var(--inset);}
  .upload svg{width:22px;height:22px;color:var(--brand);}
  .upload.done{border-style:solid; border-color:var(--ok); background:var(--ok-tint);}

  /* penny drop */
  .pennychip{display:inline-flex; align-items:center; gap:8px; background:var(--ok-tint); color:var(--ok-pill-fg); border-radius:12px; padding:11px 14px; font-size:13px; font-weight:600;}
  .pennychip svg{width:16px;height:16px;}
  .bankchip{display:inline-flex; align-items:center; gap:8px; background:var(--chip); color:var(--brand); border-radius:10px; padding:8px 12px; font-size:12.5px; font-weight:600; margin-top:8px;}
  .bankchip svg{width:14px;height:14px;}

  /* nominee */
  .nom-card{border:1px solid var(--hair); border-radius:14px; margin-bottom:12px; overflow:hidden;}
  .nom-head{display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:var(--inset); cursor:pointer;}
  .nom-head .t{font-size:14px; font-weight:600; color:var(--ink);}
  .minor-badge{background:var(--warn-tint); color:var(--warn-pill-fg); border-radius:999px; padding:2px 9px; font-size:10.5px; font-weight:700; margin-left:8px;}
  .nom-body{padding:16px;}
  .alloc-meter{background:var(--inset); border-radius:12px; padding:12px 14px; margin:12px 0; font-size:13px; font-weight:600;}
  .alloc-meter.ok{color:var(--ok-pill-fg);} .alloc-meter.bad{color:var(--err);}
  .alloc-bar{height:6px; background:var(--track); border-radius:999px; margin-top:8px; overflow:hidden;}
  .alloc-bar > i{display:block; height:100%; border-radius:999px; transition:width .3s;}
  .sebi-banner{background:var(--chip); border:1px solid #CFE0FB; border-radius:12px; padding:13px 15px; font-size:13px; color:var(--ink); line-height:1.5; margin:12px 0; display:flex; gap:9px;}
  .sebi-banner svg{width:16px;height:16px;color:var(--brand);flex:none;margin-top:1px;}
  .addmore{width:100%; border:1px dashed var(--input); border-radius:14px; padding:13px; background:#fff; color:var(--brand); font-weight:600; font-size:13.5px; display:flex; align-items:center; justify-content:center; gap:8px;}
  .addmore:disabled{color:var(--hint); cursor:default;}
  .addmore svg{width:16px;height:16px;}

  /* review */
  .rev-sec{border:1px solid var(--hair); border-radius:14px; margin-bottom:12px; overflow:hidden;}
  .rev-head{display:flex; align-items:center; justify-content:space-between; padding:13px 16px; background:var(--inset);}
  .rev-head .t{font-size:14px; font-weight:600; color:var(--ink); display:flex; align-items:center; gap:8px;}
  .rev-body{padding:6px 16px 14px;}
  .rev-row{display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--hair); gap:12px;}
  .rev-row:last-child{border-bottom:none;}
  .rev-row .k{font-size:12.5px; color:var(--muted); flex:none;}
  .rev-row .v{font-size:13px; color:var(--ink); font-weight:500; text-align:right; flex:1;}
  .prov{border-radius:999px; padding:2px 9px; font-size:10px; font-weight:600; white-space:nowrap;}
  .prov.dist{background:var(--track); color:var(--muted);}
  .prov.inv{background:var(--ok-tint); color:var(--ok-pill-fg);}
  .prov.sys{background:var(--chip); color:var(--brand);}

  /* checklist (handoff / send status) */
  .checklist .cl{display:flex; align-items:center; gap:11px; padding:9px 0;}
  .checklist .cl .ci{width:22px;height:22px;border-radius:999px;flex:none;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--input);background:#fff;}
  .checklist .cl.done .ci{background:var(--ok); border-color:var(--ok);}
  .checklist .cl.done .ci svg{width:12px;height:12px;color:#fff;}
  .checklist .cl.active .ci{border-color:var(--brand);}
  .checklist .cl.active .ci .spin{width:12px;height:12px;border:2px solid var(--chip);border-top-color:var(--brand);border-radius:999px;animation:spin .8s linear infinite;}
  .checklist .cl .ct{font-size:13.5px; color:var(--muted);}
  .checklist .cl.done .ct, .checklist .cl.active .ct{color:var(--ink); font-weight:500;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* modal */
  .modal-scrim{position:fixed; inset:0; background:rgba(10,15,30,.45); z-index:200; display:flex; align-items:center; justify-content:center; animation:fade .15s;}
  @keyframes fade{from{opacity:0;} to{opacity:1;}}
  .modal{background:#fff; border-radius:24px; width:440px; max-width:92%; overflow:hidden; animation:pop .2s cubic-bezier(.2,.8,.2,1);}
  @keyframes pop{from{transform:scale(.94); opacity:0;} to{transform:scale(1); opacity:1;}}
  .modal.left{text-align:left;}
  .notes-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 12px;}
  .notes-head .t{font-size:17px;font-weight:700;color:var(--ink);}
  .notes-x{width:32px;height:32px;border-radius:999px;background:var(--track);border:none;display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .notes-x:hover{background:var(--hair);}
  .notes-body{padding:0 22px 22px;max-height:60vh;overflow-y:auto;}
  .modal .mbody{padding:28px 26px 22px; text-align:center;}
  .modal .micon{width:66px;height:66px;border-radius:999px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;}
  .modal .micon svg{width:32px;height:32px;}
  .modal .mtitle{font-size:20px; font-weight:700; color:var(--ink);}
  .modal .mmsg{font-size:14px; color:var(--muted); line-height:1.55; margin-top:8px;}
  .modal .macts{display:flex; flex-direction:column; gap:10px; margin-top:20px;}
  .modal .demo-strip{background:var(--ink); padding:12px 16px;}
  .modal .demo-strip .dl{font-size:10.5px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; color:rgba(255,255,255,.6); margin-bottom:8px;}
  .modal .demo-strip .dbtns{display:flex; flex-wrap:wrap; gap:6px;}
  .modal .demo-strip .db{background:rgba(255,255,255,.12); color:#fff; border:none; border-radius:8px; padding:6px 10px; font-size:11px; font-weight:500; display:inline-flex; align-items:center;}
  .modal .demo-strip .db:hover{background:rgba(255,255,255,.22);}
  .modal .demo-strip .db.on{background:#fff; color:var(--ink); font-weight:600;}

  /* demo panel */
  .demo-panel{position:fixed; top:60px; right:360px; width:320px; background:var(--ink); color:#fff; border-radius:16px; z-index:210; padding:18px; box-shadow:0 20px 50px rgba(0,0,0,.35);}
  .demo-panel .dh{font-size:10.5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:rgba(255,255,255,.55); margin-bottom:14px;}
  .demo-panel .sect{font-size:12px; font-weight:600; color:rgba(255,255,255,.85); margin:14px 0 8px;}
  .demo-panel .opt{display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:10px; font-size:13px; color:rgba(255,255,255,.9); cursor:pointer;}
  .demo-panel .opt:hover{background:rgba(255,255,255,.08);}
  .demo-panel .opt.on{background:rgba(255,255,255,.14); font-weight:600;}
  .demo-panel .opt .rd{width:16px;height:16px;border-radius:999px;border:2px solid rgba(255,255,255,.4);flex:none;display:flex;align-items:center;justify-content:center;}
  .demo-panel .opt.on .rd{border-color:#fff;} .demo-panel .opt.on .rd::after{content:'';width:8px;height:8px;border-radius:999px;background:#fff;}
  .demo-panel .dbtn{width:100%; background:rgba(255,255,255,.12); color:#fff; border:none; border-radius:10px; padding:10px; font-size:13px; font-weight:600; margin-top:8px;}
  .demo-panel .dbtn:hover{background:rgba(255,255,255,.2);}
  .demo-panel select{width:100%; background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.2); border-radius:10px; padding:9px; font-size:12.5px; margin-top:4px;}

  /* toast */
  .toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; font-size:13px; font-weight:500; padding:13px 20px; border-radius:14px; z-index:300; opacity:0; pointer-events:none; transition:.2s; box-shadow:0 12px 30px rgba(10,31,68,.3); max-width:520px; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* note drawer */
  .drawer-scrim{position:fixed; inset:0; background:rgba(10,15,30,.35); z-index:220; display:flex; justify-content:flex-end;}
  .drawer{width:400px; background:#fff; height:100vh; padding:22px; overflow-y:auto; animation:slidein .2s;}
  @keyframes slidein{from{transform:translateX(30px); opacity:.6;} to{transform:translateX(0); opacity:1;}}
  .note-item{background:var(--inset); border-radius:12px; padding:12px; margin-bottom:10px; font-size:13px;}
  .note-item .meta{font-size:11px; color:var(--hint); margin-top:6px;}

  /* ---------- PHONE INNER SCREENS ---------- */
  .ph-idle{height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--hint); padding:30px; text-align:center;}
  .ph-idle img{height:22px; opacity:.5;}
  .ph-idle .t{font-size:13px; color:var(--muted);}
  .mail{padding:14px;}
  .mail .from{display:flex; align-items:center; gap:9px; padding-bottom:11px; border-bottom:1px solid var(--hair);}
  .mail .from .mav{width:34px;height:34px;border-radius:999px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
  .mail .from .fn{font-size:12.5px;font-weight:600;color:var(--ink);}
  .mail .from .fe{font-size:11px;color:var(--hint);}
  .mail .subj{font-size:14px;font-weight:600;color:var(--ink);margin:14px 0 4px;}
  .mail .otpbig{font-size:34px;font-weight:700;letter-spacing:6px;color:var(--brand);text-align:center;margin:22px 0;}
  .mail .mtxt{font-size:12.5px;color:var(--muted);line-height:1.55;}
  .sms-wrap{padding:16px 12px;}
  .sms-hdr{text-align:center;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:14px;}
  .sms{background:#E9E9EB;border-radius:16px;padding:11px 13px;font-size:13px;color:#111;max-width:230px;line-height:1.45;}
  .sms .lnk{color:var(--brand);}
  .sms-time{font-size:10px;color:var(--hint);text-align:center;margin:8px 0;}
  .tap-hint{margin-top:12px;text-align:center;font-size:11px;color:var(--brand);font-weight:600;animation:pulse 1.4s infinite;}
  .webview{height:100%;display:flex;flex-direction:column;}
  .wv-bar{background:var(--inset);border-bottom:1px solid var(--hair);padding:8px 12px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;}
  .wv-bar svg{width:12px;height:12px;}
  .wv-body{flex:1;min-height:0;overflow-y:auto;padding:16px;}
  .wv-logo{height:22px;margin-bottom:14px;}
  .idcard{border-radius:14px;padding:14px;color:#fff;background:linear-gradient(135deg,#0047BD,#0038A0);margin:12px 0;}
  .idcard .n{font-size:15px;font-weight:700;} .idcard .p{font-size:12px;opacity:.85;margin-top:3px;}
  .dgl{background:#6C3FC5;} /* digilocker purple */
  .btn-wv{width:100%;background:var(--brand);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;margin-top:12px;}
  .btn-wv.purple{background:#6C3FC5;}
  .rec-btn{width:64px;height:64px;border-radius:999px;background:var(--err);border:4px solid #fff;box-shadow:0 0 0 2px var(--err);margin:14px auto;display:block;}
  .rec-live{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--err);font-weight:600;font-size:13px;margin:14px 0;}
  .rec-live .rd{width:10px;height:10px;border-radius:999px;background:var(--err);animation:pulse 1s infinite;}
  .success-ph{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center;}
  .success-ph .sc{width:70px;height:70px;border-radius:999px;background:var(--ok);display:flex;align-items:center;justify-content:center;}
  .success-ph .sc svg{width:34px;height:34px;color:#fff;}

  .flex1{flex:1;} .mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt16{margin-top:16px;} .mt20{margin-top:20px;} .mt24{margin-top:24px;}
  .gap8{gap:8px;} .between{justify-content:space-between;}
  .hero-check{width:80px;height:80px;border-radius:999px;background:var(--ok);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
  .hero-check svg{width:40px;height:40px;color:#fff;}
  .sumchips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:18px 0;}
  .sumchip{background:var(--ok-tint);color:var(--ok-pill-fg);border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;}
  .sumchip svg{width:13px;height:13px;}

  /* ---------- REFER & EARN ---------- */
  .refer-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  .rstat{border-radius:16px; padding:18px 20px; text-align:center;}
  .rstat .rlbl{font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--muted);}
  .rstat .rnum{font-size:28px; font-weight:700; color:var(--ink); margin-top:8px;}
  .logtable thead th{font-weight:600;}
  .earn-pill{background:var(--ok-tint); color:var(--ok-pill-fg); border-radius:999px; padding:3px 10px; font-size:11.5px; font-weight:600;}
  .pager{display:flex; justify-content:flex-end; gap:6px; margin-top:14px;}
  .pg{border:1px solid var(--input); background:#fff; color:var(--muted); border-radius:9px; padding:7px 12px; font-size:12.5px; font-weight:500;}
  .pg.on{background:var(--brand); border-color:var(--brand); color:#fff;}
  .pg:disabled{opacity:.5; cursor:default;}
  .pg:not(.on):not(:disabled):hover{background:var(--inset);}

  .qr-card{background:#fff; border:1px solid var(--hair); border-radius:18px; padding:18px; width:300px; text-align:center;}
  .qr-card-h{display:flex; align-items:center; justify-content:center; gap:8px; font-size:14px; font-weight:700; color:var(--ink); margin-bottom:14px;}
  .qr-card-h svg{width:16px;height:16px;color:var(--brand);}
  .qr-box{width:180px; height:180px; margin:0 auto; padding:10px; background:#fff; border:1px solid var(--hair); border-radius:14px;}
  .qr-box svg{width:100%;height:100%;display:block;}
  .qr-url{font-size:12px; color:var(--brand); font-weight:600; margin-top:12px; word-break:break-all;}

  /* whatsapp phone */
  .wa{height:100%; display:flex; flex-direction:column; background:#E5DDD5;}
  .wa-header{display:flex; align-items:center; gap:9px; background:#075E54; color:#fff; padding:10px 12px;}
  .wa-header .wa-back{display:flex;} .wa-header .wa-back svg{width:18px;height:18px;color:#fff;}
  .wa-av{width:32px;height:32px;border-radius:999px;background:#fff;color:#075E54;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;}
  .wa-name{font-size:13px;font-weight:600;} .wa-status{font-size:10.5px;opacity:.8;}
  .wa-chat{flex:1;min-height:0;overflow-y:auto;padding:14px 12px;}
  .wa-msg{background:#DCF8C6;border-radius:12px;padding:8px;max-width:250px;margin-left:auto;box-shadow:0 1px 1px rgba(0,0,0,.1);}
  .wa-qr{background:#fff;border-radius:8px;padding:10px;position:relative;}
  .wa-qr svg{width:100%;height:auto;display:block;}
  .wa-qr-brand{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:#fff;padding:2px 6px;border-radius:4px;box-shadow:0 0 0 3px #fff;}
  .wa-qr-brand img{height:12px;display:block;}
  .wa-txt{font-size:12px;color:#111;line-height:1.5;margin-top:8px;}
  .wa-link{color:#0047BD;text-decoration:underline;cursor:pointer;}
  .wa-time{font-size:9.5px;color:#667;text-align:right;margin-top:4px;}
  .refer-tag{display:inline-block;background:var(--chip);color:var(--brand);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;}
  .earn-badge{background:var(--ok-tint);color:var(--ok-pill-fg);border-radius:999px;padding:8px 18px;font-size:15px;font-weight:700;}

  /* ---------- INVESTORS / KYC PAGES ---------- */
  .app.nophone{grid-template-columns:232px 1fr;}
  .page-head{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; gap:16px;}
  .viewtoggle{display:inline-flex; background:var(--track); border-radius:12px; padding:4px; gap:2px; flex:none;}
  .viewtoggle button{display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:9px; font-size:12.5px; font-weight:500; color:var(--muted); background:none; border:none;}
  .viewtoggle button svg{width:15px;height:15px;}
  .viewtoggle button.on{background:#fff; color:var(--ink); font-weight:600; box-shadow:0 1px 3px rgba(10,31,68,.08);}
  .filterchips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;}
  .fchip{border:1px solid var(--input); background:#fff; color:var(--muted); border-radius:999px; padding:7px 13px; font-size:12.5px; font-weight:500;}
  .fchip:hover{border-color:var(--brand); color:var(--brand);}
  .fchip.on{border-color:var(--brand); background:var(--chip); color:var(--brand); font-weight:600;}
  .empty-state{text-align:center; padding:48px; color:var(--hint); font-size:14px;}
  .inv-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px;}
  .inv-card{background:#fff; border:1px solid var(--hair); border-radius:16px; padding:16px; display:flex; flex-direction:column;}
  .ic-top{display:flex; align-items:center; gap:11px; margin-bottom:14px;}
  .ic-av{width:42px;height:42px;border-radius:999px;background:var(--chip);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:none;}
  .ic-id{flex:1;min-width:0;}
  .ic-name{font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ic-sub{font-size:12.5px;color:var(--muted);}
  .ic-rows{border-top:1px solid var(--hair);padding-top:12px;}
  .ic-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;gap:10px;}
  .ic-k{font-size:12px;color:var(--muted);flex:none;}
  .ic-v{font-size:12.5px;color:var(--ink);font-weight:500;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ic-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--hair);margin-top:12px;padding-top:12px;}
  .ko-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px;}
  .ko-stat{background:#fff;border:1px solid var(--hair);border-radius:14px;padding:14px 16px;}
  .ko-stat .ks-num{font-size:24px;font-weight:700;color:var(--ink);}
  .ko-stat .ks-lbl{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.3;}
  .ko-filters{display:flex;flex-wrap:wrap;gap:24px;}
  .fgroup{display:flex;align-items:center;gap:12px;}
  .fgroup .fgl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--hint);flex:none;}
  .fgroup .filterchips{margin-bottom:0;}

  /* ---------- TOPBAR QUICK TOGGLES ---------- */
  .qtoggle{display:flex; align-items:center; gap:7px; background:#fff; border:1px solid var(--input); border-radius:11px; padding:8px 11px; font-size:12px; font-weight:600; color:var(--muted);}
  .qtoggle svg{width:15px;height:15px;}
  .qtoggle .qst{font-size:9.5px; font-weight:700; letter-spacing:.4px; padding:2px 6px; border-radius:999px; background:var(--track); color:var(--hint);}
  .qtoggle.on{border-color:var(--brand); color:var(--brand); background:var(--chip);}
  .qtoggle.on .qst{background:var(--brand); color:#fff;}

  /* ---------- BIG DEMO CONTROLS PANEL ---------- */
  .dc-scrim{position:fixed; inset:0; background:rgba(10,15,30,.55); z-index:250; display:flex; align-items:center; justify-content:center; animation:fade .15s;}
  .dc-panel{background:#12172A; color:#fff; border-radius:22px; width:720px; max-width:94%; max-height:88vh; overflow-y:auto; animation:pop .2s cubic-bezier(.2,.8,.2,1);}
  .dc-panel::-webkit-scrollbar{width:8px;} .dc-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:8px;}
  .dc-top{position:sticky; top:0; background:#12172A; padding:22px 24px 14px; border-bottom:1px solid rgba(255,255,255,.08); z-index:2;}
  .dc-top .row{display:flex;align-items:center;justify-content:space-between;}
  .dc-title{font-size:18px; font-weight:700;}
  .dc-sub{font-size:12px; color:rgba(255,255,255,.5); margin-top:4px;}
  .dc-x{width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.1);border:none;color:#fff;display:flex;align-items:center;justify-content:center;}
  .dc-x:hover{background:rgba(255,255,255,.2);}
  .dc-body{padding:8px 24px 24px;}
  .dc-sect{border-top:1px solid rgba(255,255,255,.08); padding-top:14px; margin-top:14px;}
  .dc-sect:first-child{border-top:none;margin-top:4px;}
  .dc-sect-h{font-size:11px; font-weight:700; letter-spacing:.7px; text-transform:uppercase; color:#7C8BB0; margin-bottom:6px;}
  .dc-row{display:flex; align-items:center; justify-content:space-between; gap:18px; padding:11px 0;}
  .dc-l{font-size:13.5px; font-weight:600; color:#fff;}
  .dc-d{font-size:11.5px; color:rgba(255,255,255,.5); margin-top:2px; line-height:1.4; max-width:400px;}
  .switch{width:46px;height:27px;border-radius:999px;background:rgba(255,255,255,.2);position:relative;transition:.2s;flex:none;cursor:pointer;border:none;}
  .switch.on{background:#4C8DFF;}
  .switch::after{content:'';width:21px;height:21px;border-radius:999px;background:#fff;position:absolute;top:3px;left:3px;transition:.2s;}
  .switch.on::after{left:22px;}
  .dc-seg{display:flex;background:rgba(255,255,255,.1);border-radius:10px;padding:3px;flex:none;}
  .dc-seg button{padding:7px 13px;border-radius:8px;font-size:12px;color:rgba(255,255,255,.7);background:none;border:none;white-space:nowrap;}
  .dc-seg button.on{background:#fff;color:#12172A;font-weight:600;}
  .dc-opt{display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:10px; font-size:13px; color:rgba(255,255,255,.9); cursor:pointer;}
  .dc-opt:hover{background:rgba(255,255,255,.07);}
  .dc-opt.on{background:rgba(255,255,255,.13); font-weight:600;}
  .dc-opt .rd{width:16px;height:16px;border-radius:999px;border:2px solid rgba(255,255,255,.4);flex:none;display:flex;align-items:center;justify-content:center;}
  .dc-opt.on .rd{border-color:#fff;} .dc-opt.on .rd::after{content:'';width:8px;height:8px;border-radius:999px;background:#fff;}
  .dc-select{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:9px;font-size:12.5px;flex:1;}
  .dc-btn{background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;}
  .dc-btn:hover{background:rgba(255,255,255,.2);}

  /* ---------- AADHAAR MASKED UI ---------- */
  .aadhaar-group{display:flex; align-items:center; gap:8px;}
  .aadhaar-mask{display:flex; align-items:center; gap:6px; border:1px solid var(--input); border-radius:12px; padding:12px 12px; background:var(--inset); color:var(--hint); font-size:15px; letter-spacing:2px; flex:1;}
  .aadhaar-mask .grp{font-weight:700;}
  .aadhaar-last{width:96px;}
  .aadhaar-last input{width:100%; text-align:center; letter-spacing:4px; font-weight:600;}

  /* ---------- GENERATED SIGNATURE ---------- */
  .sig-gen{border:1px solid var(--input); border-radius:14px; padding:14px 18px; background:var(--inset); display:flex; align-items:center; justify-content:space-between;}
  .sig-name{font-family:'Dancing Script',cursive; font-size:34px; color:var(--ink); line-height:1;}
  .sig-tag{font-size:10.5px; color:var(--ok-pill-fg); background:var(--ok-tint); border-radius:999px; padding:3px 9px; font-weight:600;}
</style>

/* global fuzzy match across all investor fields */
function matchesQuery(inv,q){
  if(!q||!q.trim()) return true;
  const s=q.toLowerCase();
  const k=kycStatusOf(inv), o=onboardingStatusOf(inv);
  const hay=[inv.name,inv.email,inv.mobile,inv.pan,inv.status,inv.journey||'',k.label,o.label,'kyc',(inv.journey==='kyc'?'kyc journey':'onboarding journey')].join(' ').toLowerCase();
  return hay.includes(s);
}
/* derived KYC + onboarding status */
function kycStatusOf(inv){
  const s=inv.status;
  if(['Investment Ready','Investing','Completed'].includes(s)) return {label:'Verified',tone:'ok'};
  if(inv.journey==='onboarding') return {label:'Verified',tone:'ok'};
  if(s==='KYC In Progress') return {label:'In Progress',tone:'warn'};
  if(s==='Awaiting Investor') return {label:'Awaiting Investor',tone:'warn'};
  if(s==='Lost') return {label:'Not Verified',tone:'err'};
  return {label:'Not Started',tone:'hint'};
}
function onboardingStatusOf(inv){
  const s=inv.status;
  if(['Completed','Investing'].includes(s)) return {label:'Completed',tone:'ok'};
  if(s==='Investment Ready') return {label:'In Progress',tone:'warn'};
  if(s==='Awaiting Investor') return {label:'In Progress',tone:'warn'};
  if(s==='Lost') return {label:'Abandoned',tone:'err'};
  return {label:'Not Started',tone:'hint'};
}
function tonePill(o){
  const map={ok:['var(--ok-pill-fg)','var(--ok-pill-bg)'],warn:['var(--warn-pill-fg)','var(--warn-tint)'],err:['var(--err-pill-fg)','var(--err-tint)'],hint:['var(--hint)','var(--track)'],brand:['var(--brand)','var(--chip)']}[o.tone];
  return '<span class="pill" style="color:'+map[0]+';background:'+map[1]+'"><span class="pdot"></span>'+o.label+'</span>';
}

function qrSvg(px){
  const N=25, cell=px/N;
  function r(mx,my,mw,mh,c){ return '<rect x="'+(mx*cell).toFixed(2)+'" y="'+(my*cell).toFixed(2)+'" width="'+(mw*cell).toFixed(2)+'" height="'+(mh*cell).toFixed(2)+'" fill="'+c+'"/>'; }
  function finder(x,y){ return r(x,y,7,7,'#0A1F44')+r(x+1,y+1,5,5,'#fff')+r(x+2,y+2,3,3,'#0A1F44'); }
  let seed=1337; function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return (seed>>16)&1; }
  let mods='';
  for(let y=0;y<N;y++) for(let x=0;x<N;x++){
    const inF=(x<8&&y<8)||(x>N-9&&y<8)||(x<8&&y>N-9);
    if(inF) continue;
    if(rnd()) mods+=r(x,y,1,1,'#0A1F44');
  }
  return '<svg viewBox="0 0 '+px+' '+px+'" width="'+px+'" height="'+px+'"><rect width="'+px+'" height="'+px+'" fill="#fff"/>'+finder(0,0)+finder(N-7,0)+finder(0,N-7)+mods+'</svg>';
}
function referStat(lbl,val,tint,accent){
  return '<div class="rstat" style="background:'+tint+';border-left:4px solid '+accent+';"><div class="rlbl">'+lbl+'</div><div class="rnum">'+val+'</div></div>';
}

function renderReferLogs(){

  const per=10, pages=Math.max(1,Math.ceil(list.length/per));

  const start=(rf.page-1)*per;

  let pager='';

  for(let p=1;p<=pages;p++) pager+='<button class="pg'+(p===rf.page?' on':'')+'" onclick="referPage('+p+')">'+p+'</button>';

  return '<div class="card p20" id="referlogs" style="margin-top:16px;">'+

    '<div class="muted" style="font-size:12.5px;margin-bottom:14px;">Every scan, number entry and install from your referral QR.</div>'+

function renderRail(){

let resendTimers={};
function resendText(kind){
  const left=state.phone['resend_'+kind]!=null?state.phone['resend_'+kind]:30;
  const cnt=state.phone['resendCount_'+kind]||0;
  if(cnt>=3) return 'Limit reached — try again later.';
  if(left>0) return "Didn't receive it? Resend code in <b>"+left+"s</b>";
  return "Didn't receive it? <b onclick=\"doResend('"+kind+"')\" style=\"cursor:pointer\">Resend</b>";
}
function startResend(kind){
  clearInterval(resendTimers[kind]);
  state.phone['resend_'+kind]=30;
  resendTimers[kind]=setInterval(()=>{
    state.phone['resend_'+kind]--;
    const el=document.getElementById('resend_'+kind);
    if(el) el.innerHTML=resendText(kind);
    if(state.phone['resend_'+kind]<=0) clearInterval(resendTimers[kind]);
  },1000);
}
function doResend(kind){
  const cnt=(state.phone['resendCount_'+kind]||0)+1;
  state.phone['resendCount_'+kind]=cnt;
  if(cnt>3){ document.getElementById('resend_'+kind).innerHTML=resendText(kind); return; }
  startResend(kind);
  toast('OTP resent.');
  document.getElementById('resend_'+kind).innerHTML=resendText(kind);
}
function otpInput(kind,idx,n,el){
  el.value=el.value.replace(/\D/g,'');
  if(el.value){ el.classList.add('filled'); el.classList.remove('err'); if(idx<n-1) document.getElementById('otp_'+kind+'_'+(idx+1)).focus(); }
  else el.classList.remove('filled');
}
function otpKey(e,kind,idx){ if(e.key==='Backspace'&&!e.target.value&&idx>0) document.getElementById('otp_'+kind+'_'+(idx-1)).focus(); }
function readOtp(kind,n){ let s=''; for(let j=0;j<n;j++){ const el=document.getElementById('otp_'+kind+'_'+j); s+=el?el.value:''; } return s; }
function verifyOtp(kind){
  const code=kind==='email'?OTP_EMAIL:OTP_PHONE;
  const entered=readOtp(kind,6);
  if(entered===code){
    setD(kind==='email'?'emailVerified':'phoneVerified',true);
    if(kind==='email'){ setPill('Contact Verified'); if(state.demo.phoneOtp && !d('phoneVerified')){ state.phone.mode='sms_otp'; startResend('phone'); } else state.phone.mode='idle'; }
    if(kind==='phone'){ state.phone.mode='idle'; }
    patchMain(); patchPhone();
    // enable continue if both
    setTimeout(()=>{ const b=document.getElementById('continueBtn'); if(b) b.disabled=!(d('emailVerified')&&d('phoneVerified')); },0);
  } else {
    for(let j=0;j<6;j++){ const el=document.getElementById('otp_'+kind+'_'+j); if(el) el.classList.add('err'); }
    // show error
    const panel=document.getElementById('resend_'+kind);
    if(panel) panel.innerHTML='<span style="color:var(--err);font-weight:500;">Incorrect OTP. Please try again.</span>';
  }
}

function wizPrev(){ const l=stepList(); const i=stepIndex(); if(i>0){ state.wizard.step=l[i-1][0]; render(); } }
function wizNext(){
  const step=state.wizard.step;
  if(step==='investor_details'){ if(!validInvestorDetails()){ toast('Please complete all fields.'); return; } const inv=activeInv(); if(d('name')) inv.name=d('name'); inv.email=d('email'); inv.mobile=d('mobile').replace(/(\d{5})(\d{5})/,'$1 $2'); setPill('Draft');
    // apply OTP toggles: channels with OTP off are auto-verified
    if(!state.demo.emailOtp) setD('emailVerified',true);
    if(!state.demo.phoneOtp) setD('phoneVerified',true);
    // pick phone mode: first channel that still needs an OTP
    if(state.demo.emailOtp && !d('emailVerified')){ state.phone.mode='email_otp'; startResend('email'); }
    else if(state.demo.phoneOtp && !d('phoneVerified')){ state.phone.mode='sms_otp'; startResend('phone'); }
    else state.phone.mode='idle';
    state.wizard.step='contact'; render(); return; }
  if(step==='contact'){ if(!(d('emailVerified')&&d('phoneVerified'))){ toast('Verify both email and phone.'); return; } setPill('Contact Verified'); state.phone.mode='idle'; state.wizard.step='pan'; render(); return; }
  if(step==='kyc_personal'){ if(!validKycPersonal()){ toast('Complete all required fields.'); return; } state.wizard.step='kyc_address'; render(); return; }
  if(step==='kyc_address'){ if(!validKycAddress()){ toast('Complete all required fields.'); return; } state.wizard.step='kyc_handoff'; render(); return; }
  if(step==='ob_demographic'){ if(!validDemographic()){ toast('Complete all required fields incl. email verification.'); return; } state.wizard.step='ob_bank'; render(); return; }
  if(step==='ob_bank'){ if(state.demo.bankVerify){ if(!d('pennyVerified')){ toast('Verify the bank account (penny drop) first.'); return; } if(!validBankFields()){ toast('Complete all bank fields (account numbers must match).'); return; } } state.wizard.step='ob_nominee'; render(); return; }

    '<div class="otpwrap" style="justify-content:center;">'+[0,1,2,3,4,5].map(j=>'<input class="otpbox sm" value="'+code[j]+'" readonly style="border-color:var(--brand)"/>').join('')+'</div>'+
    '<button class="btn-wv'+(title.includes('DigiLocker')?' purple':'')+'" style="margin-top:14px;" onclick="'+nextFn+'()">'+btnLabel+'</button></div></div>';
}
function phSuccess(title,sub,nextFn,btnLabel){
  return '<div class="success-ph"><div class="sc">'+ic('check')+'</div><div style="font-size:17px;font-weight:700;">'+title+'</div>'+
    '<div class="muted" style="font-size:13px;line-height:1.5;">'+sub+'</div>'+
    (nextFn?'<button class="btn-wv" style="max-width:200px;margin-top:8px;" onclick="'+nextFn+'()">'+btnLabel+'</button>':'')+'</div>';
}
function dglNext(){ state.phone.sub++; patchPhone(); patchMain(); }

/* --- Review flow (sub 0..4) --- */
function phReview(){
  const s=state.phone.sub; const inv=activeInv(); const dd=state.wizard.data;
  const needVideo = dd.nomineeChoice==='optout' && state.demo.videoDecl;
  if(state.phone.drop&&s===0){
    return '<div class="sms-wrap"><div class="sms-hdr">PERCNT</div><div class="sms-time">Today 9:41 AM</div>'+
      '<div class="sms">Please verify your details for your Perccent account: <span class="lnk">https://percc.nt/r/riya7</span></div>'+
      '<div class="phone-caption" style="color:var(--warn-pill-fg);margin-top:16px;">Investor hasn\'t opened the link yet…</div></div>';
  }
  if(s===0) return '<div class="sms-wrap"><div class="sms-hdr">PERCNT</div><div class="sms-time">Today 9:41 AM</div>'+
    '<div class="sms">Please verify your details for your Perccent account: <span class="lnk">https://percc.nt/r/riya7</span></div>'+
    '<div class="tap-hint" onclick="revNext()" style="display:flex;align-items:center;justify-content:center;gap:5px;">'+mi('touch_app',{size:15})+'Tap the link</div></div>';
  if(s===1){
    const rows=[['Name',inv?inv.name:'Riya Sharma'],['Mobile','+91 '+(inv?inv.mobile:'')],['Email',dd.email||'riya@sharma99.com'],['PAN',inv?inv.pan:'FMKPS****4L'],['Bank','••••'+((dd.bankAcc||'12344021').slice(-4))]];
    return '<div class="webview"><div class="wv-bar">'+ic('lock')+'percc.nt/r/riya7</div><div class="wv-body">'+
      '<img class="wv-logo" src="'+LOGO_SRC+'"/><div style="font-size:15px;font-weight:700;">Hi '+esc((inv?inv.name:'Riya').split(' ')[0])+', please review</div>'+
      '<div style="font-size:12px;color:var(--muted);margin:2px 0 12px;">the details your distributor Sagnik entered</div>'+
      rows.map(r=>'<div class="rev-row"><span class="k">'+r[0]+'</span><span class="v">'+esc(r[1])+'</span></div>').join('')+
      (needVideo?'<div class="card p16" style="margin-top:14px;border-style:dashed;text-align:center;"><div style="font-size:13px;font-weight:600;margin-bottom:6px;">Video declaration required</div>'+
        '<div style="font-size:12px;color:var(--muted);line-height:1.5;">Record: "I confirm I do not wish to add a nominee for my investments."</div>'+
        (dd._videoRecorded?'<div style="color:var(--ok-pill-fg);font-weight:600;margin-top:10px;font-size:13px;">'+ic('check','')+' Recorded 0:18 ✓ (2.1 MB)</div>':'<button class="rec-btn" onclick="recordVideo()"></button>')+'</div>':'')+
      '<div class="chk'+(dd._reviewConfirm?' on':'')+'" style="margin-top:14px;" onclick="setD(\'_reviewConfirm\',!d(\'_reviewConfirm\'));patchPhone()"><div class="box">'+(dd._reviewConfirm?ic('check'):'')+'</div><div class="txt">I confirm all details are correct</div></div>'+
      '<button class="btn-wv" onclick="revConfirm()"'+((needVideo&&!dd._videoRecorded)||!dd._reviewConfirm?' disabled style="opacity:.5"':'')+'>Confirm with OTP</button></div></div>';
  }
  if(s===2) return '<div class="webview"><div class="wv-bar">'+ic('lock')+'percc.nt/r/riya7</div><div class="wv-body">'+
    '<div style="font-size:15px;font-weight:700;margin-bottom:10px;">Enter confirmation OTP</div>'+
    '<div class="sms" style="margin-bottom:14px;">'+OTP_REVIEW+' is your Perccent confirmation OTP.</div>'+
    '<div class="otpwrap" style="justify-content:center;">'+[0,1,2,3,4,5].map(j=>'<input class="otpbox sm" value="'+OTP_REVIEW[j]+'" readonly style="border-color:var(--brand)"/>').join('')+'</div>'+
    '<button class="btn-wv" style="margin-top:14px;" onclick="revNext()">Verify</button></div></div>';
  if(s>=3) return '<div class="success-ph"><div class="sc">'+ic('check')+'</div><div style="font-size:17px;font-weight:700;">All set, '+esc((inv?inv.name:'Riya').split(' ')[0])+'!</div>'+
    '<div class="muted" style="font-size:13px;">Your onboarding is complete.</div>'+
    '<button class="btn-wv" style="max-width:200px;margin-top:8px;" onclick="reviewComplete()">Done</button></div>';
  return '';
}
function recordVideo(){ setD('_videoRecorded',true); patchPhone(); }
function revNext(){ state.phone.sub++; patchPhone(); patchMain(); }
function revConfirm(){ const dd=state.wizard.data; const needVideo=dd.nomineeChoice==='optout'&&state.demo.videoDecl; if((needVideo&&!dd._videoRecorded)||!dd._reviewConfirm) return; state.phone.sub=2; patchPhone(); }

/* ============================================================ INIT */
initState();
render();
</script>

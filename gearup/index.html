<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GearUp Servicing</title>
  <meta name="description" content="GearUp Servicing — multi-brand vehicle care. Call, WhatsApp, or book online.">
  <meta name="theme-color" content="#e01010">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700;800&family=Google+Sans+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── tokens ── */
    :root {
      --red:        #e01010;
      --red-dark:   #ac0000;
      --red-glow:   rgba(224, 16, 16, 0.20);
      --red-dim:    rgba(224, 16, 16, 0.09);
      --bg:         #0c0c0c;
      --surface:    #161616;
      --surface-2:  #1e1e1e;
      --line:       #272727;
      --line-hover: #e01010;
      --ink:        #f2f2f2;
      --muted:      #7a7a7a;
      --muted-2:    #555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 52px 16px 80px;
      /* subtle noise texture via gradient */
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(224,16,16,.07) 0%, transparent 70%);
    }

    /* ── card ── */
    .card {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── logo ── */
    .logo-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      box-shadow: 0 0 0 6px rgba(224,16,16,.07), 0 0 28px rgba(224,16,16,.12);
      transition: box-shadow .2s;
    }
    .logo-wrap:hover {
      box-shadow: 0 0 0 6px rgba(224,16,16,.13), 0 0 40px rgba(224,16,16,.22);
    }
    .logo-wrap img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: block;
    }

    /* ── identity ── */
    .name {
      font-size: 24px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.4px;
      text-align: center;
    }
    .name b { color: var(--red); }

    .tagline {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 5px;
      text-align: center;
      font-family: 'Google Sans Code', monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    /* ── divider ── */
    .divider {
      width: 32px;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--red-dark));
      margin: 22px auto 0;
      border-radius: 1px;
    }

    /* ── links ── */
    .links {
      width: 100%;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 0;
      text-decoration: none;
      color: var(--ink);
      font-size: 14.5px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .14s, background .14s, box-shadow .14s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    /* red left-edge accent on hover */
    .link-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--red), var(--red-dark));
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform .16s ease;
    }

    .link-btn:hover {
      border-color: rgba(224,16,16,.4);
      background: var(--surface-2);
      box-shadow: inset 0 0 0 1px rgba(224,16,16,.09), 0 2px 12px rgba(0,0,0,.3);
    }
    .link-btn:hover::before { transform: scaleY(1); }
    .link-btn:active { background: #222; }

    /* ── icon box ── */
    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--line);
      background: var(--surface-2);
    }
    .link-icon svg { width: 18px; height: 18px; }

    /* per-type icon color */
    .link-icon.phone    { color: #ff6b6b; }
    .link-icon.email    { color: #ffa94d; }
    .link-icon.whatsapp { color: #69db7c; }
    .link-icon.website  { color: #74c0fc; }
    .link-icon.amc      { color: #e01010; }

    .link-text { flex: 1; min-width: 0; }

    .link-label {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--ink);
    }

    .link-sub {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'Google Sans Code', monospace;
      letter-spacing: .04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: var(--muted-2);
      flex-shrink: 0;
      transition: color .14s, transform .14s;
    }
    .link-btn:hover .link-arrow {
      color: var(--red);
      transform: translateX(2px);
    }

    /* ── footer ── */
    footer {
      margin-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .footer-wordmark {
      font-family: 'Google Sans Code', monospace;
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted-2);
    }
    .footer-wordmark a {
      color: var(--red);
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="card">

  <div class="logo-wrap">
    <img src="gearup-logo.svg" alt="GearUp logo" width="52" height="52">
  </div>

  <div class="name">Gear<b>Up</b> Servicing</div>
  <div class="tagline">multi-brand vehicle care</div>
  <div class="divider"></div>

  <div class="links" id="links"></div>

</div>

<footer>
  <div class="footer-wordmark">by <a href="https://sgnk.ai">sgnk</a></div>
</footer>

<script>
/* ══════════════════════════════════════════
   CONFIG — edit the values below to update
   ══════════════════════════════════════════ */
const CONFIG = {
  links: [
    {
      type:  "phone",
      label: "Call Us",
      sub:   "+91 XXXXX XXXXX",            /* ← phone number */
      href:  "tel:+91XXXXXXXXXX",           /* ← tel: link    */
    },
    {
      type:  "email",
      label: "Email",
      sub:   "gearup@example.com",          /* ← email address */
      href:  "mailto:gearup@example.com",   /* ← mailto: link  */
    },
    {
      type:  "whatsapp",
      label: "WhatsApp",
      sub:   "Chat with us instantly",
      href:  "https://wa.me/91XXXXXXXXXX",  /* ← WhatsApp number */
    },
    {
      type:  "website",
      label: "Visit Website",
      sub:   "Book a service · track your job",
      href:  "https://gearup.example.com",  /* ← live site URL */
    },
    {
      type:  "amc",
      label: "AMC Chart",
      sub:   "Annual maintenance plans & pricing",
      href:  "https://gearup.example.com/amc", /* ← AMC chart URL or PDF */
    },
  ]
};

/* ══════════════════════════════════════════
   Icons (SVG strings)
   ══════════════════════════════════════════ */
const ICONS = {
  phone: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.23h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
  </svg>`,
  email: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect width="20" height="16" x="2" y="4" rx="2"/>
    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
  </svg>`,
  whatsapp: `<svg viewBox="0 0 24 24" fill="currentColor">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
    <path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.555 4.122 1.523 5.855L.057 23.882a.5.5 0 0 0 .612.612l6.111-1.6A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.007-1.375l-.357-.212-3.708.972.99-3.614-.233-.371A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182c5.429 0 9.818 4.388 9.818 9.818 0 5.429-4.389 9.818-9.818 9.818z"/>
  </svg>`,
  website: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <path d="M12 2a14.5 14.5 0 0 1 0 20 14.5 14.5 0 0 1 0-20"/>
    <path d="M2 12h20"/>
  </svg>`,
  amc: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <polyline points="10 9 9 9 8 9"/>
  </svg>`,
  arrow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
    <path d="M5 12h14M12 5l7 7-7 7"/>
  </svg>`,
};

/* ── render ── */
const container = document.getElementById("links");
CONFIG.links.forEach(link => {
  const a = document.createElement("a");
  a.className = "link-btn";
  a.href = link.href;
  if (link.href.startsWith("http")) { a.target = "_blank"; a.rel = "noopener noreferrer"; }
  a.innerHTML = `
    <div class="link-icon ${link.type}">${ICONS[link.type]}</div>
    <div class="link-text">
      <div class="link-label">${link.label}</div>
      ${link.sub ? `<div class="link-sub">${link.sub}</div>` : ""}
    </div>
    <span class="link-arrow">${ICONS.arrow}</span>
  `;
  container.appendChild(a);
});
</script>
</body>
</html>

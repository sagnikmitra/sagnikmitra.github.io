<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gear Up</title>
  <meta name="description" content="Gear Up — Call, WhatsApp, or book online.">
  <meta name="theme-color" content="#e01010">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700;800&family=Google+Sans+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    /* ── design tokens ── */
    :root {
      --red:      #e01010;
      --red-dark: #ac0000;
      --red-glow: rgba(224,16,16,.22);
      --red-dim:  rgba(224,16,16,.08);
      --bg:       #0a0a0a;
      --surf:     #141414;
      --surf2:    #1c1c1c;
      --line:     #242424;
      --ink:      #f0f0f0;
      --muted:    #6a6a6a;
      --muted2:   #444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Google Sans', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 88px;
      position: relative;
      overflow-x: hidden;
    }

    /* ════════════════════════════════
       BACKGROUND SCENE
    ════════════════════════════════ */
    .bg-scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* red radial halo at top */
    .bg-scene::before {
      content: '';
      position: absolute;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(200,10,10,.18) 0%, transparent 70%);
    }

    /* scanline overlay */
    .bg-scene::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.06) 3px,
        rgba(0,0,0,.06) 4px
      );
    }

    .bg-gear {
      position: absolute;
      opacity: .035;
      filter: blur(.5px);
      will-change: transform;
    }
    .bg-gear.cw  { animation: spin-cw  var(--d, 60s) linear infinite; }
    .bg-gear.ccw { animation: spin-ccw var(--d, 50s) linear infinite; }

    @keyframes spin-cw  { to { transform: rotate( 360deg); } }
    @keyframes spin-ccw { to { transform: rotate(-360deg); } }

    /* spark particles */
    .spark {
      position: absolute;
      border-radius: 50%;
      background: var(--red);
      opacity: 0;
      animation: rise var(--dur, 3s) ease-in var(--delay, 0s) infinite;
      will-change: transform, opacity;
    }
    @keyframes rise {
      0%   { opacity: .9; transform: translateY(0)      scale(1);   }
      60%  { opacity: .4; transform: translateY(-120px) scale(.7);  }
      100% { opacity: 0;  transform: translateY(-220px) scale(.2);  }
    }

    /* horizontal "track" line */
    .bg-track {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(224,16,16,.15), transparent);
      animation: track-pulse 4s ease-in-out infinite;
    }
    @keyframes track-pulse {
      0%,100% { opacity: .4; } 50% { opacity: 1; }
    }

    /* ════════════════════════════════
       CONTENT LAYER
    ════════════════════════════════ */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fade-up .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── logo ── */
    .logo-wrap {
      position: relative;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: var(--surf);
      border: 1.5px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      animation: logo-enter .8s cubic-bezier(.22,1,.36,1) both, glow-pulse 3s ease-in-out 1s infinite;
    }
    @keyframes logo-enter {
      from { opacity: 0; transform: scale(.6) rotate(-30deg); }
      to   { opacity: 1; transform: scale(1)  rotate(0deg);   }
    }
    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 0 0 5px rgba(224,16,16,.06), 0 0 24px rgba(224,16,16,.14); }
      50%      { box-shadow: 0 0 0 8px rgba(224,16,16,.12), 0 0 48px rgba(224,16,16,.28); }
    }

    .logo-gear {
      width: 56px; height: 56px;
      animation: spin-cw 14s linear infinite;
      transform-origin: center;
    }

    /* ── identity ── */
    .name {
      font-size: clamp(22px, 5vw, 26px);
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.4px;
      text-align: center;
      animation: fade-up .6s .15s cubic-bezier(.22,1,.36,1) both;
    }
    .name b { color: var(--red); }

    .tagline {
      font-size: clamp(10px, 2.5vw, 12px);
      color: var(--muted);
      margin-top: 5px;
      text-align: center;
      font-family: 'Google Sans Code', monospace;
      letter-spacing: .14em;
      text-transform: uppercase;
      animation: fade-up .6s .22s cubic-bezier(.22,1,.36,1) both;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 0;
      width: 100%;
      animation: fade-up .5s .28s both;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line));
    }
    .divider-line:last-child {
      background: linear-gradient(270deg, transparent, var(--line));
    }
    .divider-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: dot-pulse 2s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%,100% { transform: scale(1);   opacity: 1;  }
      50%      { transform: scale(1.5); opacity: .7; }
    }

    /* ── links ── */
    .links {
      width: 100%;
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      min-height: 60px;
      padding: 14px 16px;
      background: var(--surf);
      border: 1px solid var(--line);
      border-radius: 0;
      text-decoration: none;
      color: var(--ink);
      cursor: pointer;
      overflow: hidden;
      transition: border-color .18s, background .18s, box-shadow .18s;
      -webkit-tap-highlight-color: transparent;
      animation: link-enter .55s cubic-bezier(.22,1,.36,1) both;
    }
    .link-btn:nth-child(1) { animation-delay: .32s; }
    .link-btn:nth-child(2) { animation-delay: .40s; }
    .link-btn:nth-child(3) { animation-delay: .48s; }
    .link-btn:nth-child(4) { animation-delay: .56s; }
    .link-btn:nth-child(5) { animation-delay: .64s; }

    @keyframes link-enter {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0);     }
    }

    /* red left sweep */
    .link-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--red), var(--red-dark));
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform .2s cubic-bezier(.22,1,.36,1);
    }

    /* shimmer on hover */
    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(224,16,16,.06) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform .45s ease;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      border-color: rgba(224,16,16,.4);
      background: var(--surf2);
      box-shadow: inset 0 0 0 1px rgba(224,16,16,.1), 0 4px 20px rgba(0,0,0,.4);
      outline: none;
    }
    .link-btn:hover::before { transform: scaleY(1); }
    .link-btn:hover::after  { transform: translateX(100%); }

    .link-btn:active { background: #202020; transform: scale(.99); }

    /* ── icon box ── */
    .link-icon {
      width: 40px; height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: var(--surf2);
      transition: border-color .18s, background .18s;
    }
    .link-btn:hover .link-icon {
      border-color: rgba(224,16,16,.3);
      background: rgba(224,16,16,.07);
    }
    .link-icon svg { width: 19px; height: 19px; }

    .link-icon.phone    { color: #ff7070; }
    .link-icon.email    { color: #ffa94d; }
    .link-icon.whatsapp { color: #69db7c; }
    .link-icon.website  { color: #74c0fc; }
    .link-icon.amc      { color: var(--red); }

    /* ── text ── */
    .link-text { flex: 1; min-width: 0; }
    .link-label {
      font-size: clamp(13.5px, 3.5vw, 15px);
      font-weight: 600;
      color: var(--ink);
    }
    .link-sub {
      font-size: clamp(10.5px, 2.6vw, 12px);
      color: var(--muted);
      margin-top: 2px;
      font-family: 'Google Sans Code', monospace;
      letter-spacing: .04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: var(--muted2);
      flex-shrink: 0;
      transition: color .18s, transform .2s cubic-bezier(.22,1,.36,1);
    }
    .link-btn:hover .link-arrow {
      color: var(--red);
      transform: translateX(4px);
    }

    /* ── footer ── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 52px;
      text-align: center;
      animation: fade-up .5s .8s both;
    }
    .footer-by {
      font-family: 'Google Sans Code', monospace;
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted2);
    }
    .footer-by a {
      color: var(--red);
      font-weight: 600;
      text-decoration: none;
      transition: opacity .15s;
    }
    .footer-by a:hover { opacity: .75; }

    /* ── mobile tweaks ── */
    @media (max-width: 420px) {
      body      { padding: 36px 12px 72px; }
      .logo-wrap { width: 88px; height: 88px; }
      .logo-gear { width: 48px; height: 48px; }
      .link-btn { gap: 12px; padding: 13px 13px; }
      .link-icon { width: 38px; height: 38px; }
    }

    @media (max-width: 360px) {
      body { padding: 28px 10px 64px; }
    }

    /* ── particles canvas ── */
    #particles-js {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    #particles-js canvas { display: block; }
  </style>
</head>

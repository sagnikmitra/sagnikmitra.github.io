<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perccent — My Wealth (Demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css?family=Google+Sans:400,500,600,700&display=swap" rel="stylesheet" />
<style>
  :root{
    --blue:#0047BD; --green:#299959; --navy:#0A1F44; --gray-mid:#6B7280; --gray-light:#9CA3AF;
    --border:#EEF0F4; --input-border:#E5E8EE; --tint-blue:#EBF1FD; --icon-blue-bg:#F4F8FF;
    --soft-bg:#F8FAFE; --progress-bg:#E7F5EC; --dashboard-bg:#F5F7FA; --danger:#C9342B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Google Sans','Product Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:#E7E9EF; color:var(--navy); -webkit-font-smoothing:antialiased;
  }
  /* buttons/inputs/selects don't inherit body's font-family by default in browsers — force it */
  button, input, select, textarea{font-family:inherit;}
  .stage{min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:28px 16px 60px;}
  .topbar{width:100%; max-width:820px; display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;}
  .topbar h1{font-size:15px; font-weight:600; margin:0; color:var(--navy);}
  .topbar p{margin:2px 0 0; font-size:12px; color:var(--gray-mid);}
  .reset-btn{background:#fff; border:1px solid var(--border); color:var(--blue); font-size:12.5px; font-weight:600;
    padding:8px 14px; border-radius:10px; cursor:pointer;}
  .reset-btn:active{opacity:.7;}

  .phone-bezel{width:402px; max-width:100%; height:874px; background:#111318; border-radius:52px; padding:14px 10px;
    box-shadow:0 40px 80px -28px rgba(10,31,68,.45); position:relative;}
  .phone-notch{position:absolute; top:26px; left:50%; transform:translateX(-50%); width:120px; height:26px;
    background:#111318; border-radius:20px; z-index:200;}
  .screen{background:var(--dashboard-bg); border-radius:38px; height:100%; overflow:hidden; position:relative;
    display:flex; flex-direction:column;}
  .statusbar{display:flex; align-items:center; justify-content:space-between; padding:16px 24px 2px; font-size:14px;
    font-weight:600; color:var(--navy); flex:none;}
  .screen-scroll{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:40px;}
  .screen-scroll::-webkit-scrollbar{width:0;}

  /* ---- header bar ---- */
  .app-header{display:flex; align-items:center; justify-content:space-between; padding:8px 16px 12px;}
  .app-logo{height:26px; width:auto;}
  .header-icons{display:flex; align-items:center; gap:8px;}
  .header-icon-btn{width:32px; height:32px; border-radius:999px; display:flex; align-items:center; justify-content:center;
    background:var(--tint-blue); border:none; cursor:pointer; color:var(--blue);}
  .header-icon-btn.whatsapp{background:var(--progress-bg); color:var(--green);}
  .header-icon-btn svg{width:16px; height:16px;}

  .px-16{padding-left:16px; padding-right:16px;}
  .eyebrow{font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:1.2px; color:var(--gray-light); margin:0;}
  .page-title{font-size:22px; line-height:28px; font-weight:700; color:var(--navy); letter-spacing:-.3px; margin:4px 0 0;}

  /* ---- card primitives ---- */
  .card{width:100%; border-radius:16px; border:1px solid var(--border); background:#fff; overflow:hidden;}
  .p-4{padding:16px;}
  .mt-4{margin-top:16px;}
  .mt-3{margin-top:12px;}
  .mt-2{margin-top:8px;}
  .mt-1{margin-top:4px;}

  .row{display:flex; align-items:center;}
  .icon-box{width:48px; height:48px; min-width:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:var(--icon-blue-bg); color:var(--blue);}
  .icon-box svg{width:20px; height:20px;}
  .card-title{font-size:15px; font-weight:600; color:var(--navy); margin:0;}
  .card-sub{font-size:12.5px; color:var(--gray-mid); margin:2px 0 0; line-height:17px;}
  .card-hint{font-size:12.5px; color:var(--gray-light); margin:4px 0 0;}

  .cta-btn{width:100%; text-align:center; border:none; border-radius:16px; padding:16px 0; font-size:15px; font-weight:600;
    color:#fff; background:var(--blue); box-shadow:0 6px 14px rgba(0,71,189,.22); cursor:pointer;}
  .cta-btn:active{opacity:.85;}
  .cta-btn.disabled{background:var(--gray-light); box-shadow:none; cursor:default;}

  .spinner{width:34px; height:34px; border-radius:999px; border:3px solid var(--tint-blue); border-top-color:var(--blue);
    animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .portfolio-mode-btn{display:flex; align-items:center; gap:4px; background:none; border:none; padding:0; cursor:pointer;}
  .portfolio-mode-btn span{font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:1.2px; color:var(--gray-light);}
  .portfolio-mode-btn svg{width:15px; height:15px; color:var(--gray-mid);}
  .portfolio-value{font-size:28px; line-height:34px; font-weight:700; color:var(--navy); margin:4px 0 0;}

  .calc-cta{width:100%; display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--border);
    border-radius:16px; padding:16px; cursor:pointer; text-align:left;}
  .calc-cta:active{opacity:.85;}
  .calc-cta-icon{width:44px; height:44px; min-width:44px; border-radius:12px; background:var(--tint-blue); color:var(--blue);
    display:flex; align-items:center; justify-content:center;}
  .calc-cta-icon svg{width:20px; height:20px;}
  .calc-cta-title{font-size:15px; font-weight:600; color:var(--navy); display:block;}
  .calc-cta-desc{font-size:12.5px; color:var(--gray-mid); line-height:17px; display:block; margin-top:2px;}
  .calc-cta-chevron{color:var(--blue); min-width:20px;}
  .calc-cta-chevron svg{width:20px; height:20px;}

  /* ---- wealth progress summary (My Wealth tab) ---- */
  .wp-head{display:flex; align-items:center; justify-content:space-between;}
  .wp-head .lbl{font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:1px; color:var(--gray-mid);}
  .wp-head .pct{font-size:13px; font-weight:600; color:var(--green);}
  .wp-sub{font-size:12.5px; color:var(--gray-mid); margin-top:8px;}
  .wp-empty{font-size:13px; color:var(--gray-light); line-height:19px;}

  /* ---- bottom nav (real BaseBottomTab.tsx: 5 tabs, 56x30 active pill) ---- */
  .navbar{display:flex; align-items:flex-start; justify-content:space-between; background:#fff;
    border-top:1px solid #EDEFF3; padding:8px 8px 16px; flex:none;}
  .nav-tab{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:none; border:none; cursor:pointer; padding:0;}
  .nav-icon-pill{height:30px; width:56px; border-radius:999px; display:flex; align-items:center; justify-content:center;}
  .nav-icon-pill svg{width:20px; height:20px;}
  .nav-label{font-size:11px; line-height:13px; margin-top:3px; font-weight:500;}
  .nav-tab.on .nav-label{font-weight:600;}

  /* ---- calculator header ---- */
  .calc-header{display:flex; align-items:center; padding:14px 20px 12px;}
  .back-chip{width:32px; height:32px; border-radius:999px; background:#fff; border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--blue); flex:none;}
  .back-chip svg{width:18px; height:18px;}
  .calc-header-title{margin-left:10px; font-size:20px; font-weight:700;}
  .calc-header-title .blue{color:var(--blue);}
  .calc-header-title .dark{color:var(--navy);}

  /* ---- section header ---- */
  .section-header{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:16px;}
  .section-caption{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.2px; color:var(--gray-light); margin:0 0 6px;}
  .section-title{font-size:20px; line-height:24px; font-weight:700; color:var(--navy); letter-spacing:-.3px; margin:0;}

  /* ---- form fields ---- */
  .field{display:flex; flex-direction:column; gap:10px; margin-bottom:16px; width:100%;}
  .field label{font-size:14px; line-height:18px; font-weight:500; color:var(--navy);}
  .field input[type=text], .field input[type=number]{
    font-family:inherit; background:#fff; border:1px solid var(--input-border); border-radius:12px; padding:13px 16px;
    font-size:15px; color:var(--navy); width:100%; outline:none;}
  .field input::placeholder{color:var(--gray-light);}
  .field input:focus{border-color:var(--blue);}

  .select-field{display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--input-border);
    border-radius:12px; padding:13px 16px; cursor:pointer; width:100%;}
  .select-field span{font-size:15px; color:var(--navy);}
  .select-field span.placeholder{color:var(--gray-light);}
  .select-field svg{width:18px; height:18px; color:var(--blue); min-width:18px;}

  .currency-wrap{position:relative;}
  .currency-wrap input, .field .currency-wrap input{width:100%; border:1px solid var(--input-border); border-radius:12px;
    padding:12px 16px 12px 32px; font-size:16px; color:var(--navy); outline:none; font-family:inherit;}
  .currency-wrap input:focus{border-color:var(--blue);}
  .currency-wrap .sym{position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:16px; color:#8c8c8c; pointer-events:none;}

  /* ---- expense list ---- */
  .expense-row{display:flex; align-items:center; border:1px solid var(--border); border-radius:16px; padding:12px 14px; margin-bottom:10px;}
  .expense-row .info{flex:1; padding-right:8px;}
  .expense-row .info .name{font-size:14px; font-weight:600; color:var(--navy); margin:0;}
  .expense-row .info .meta{font-size:11.5px; color:var(--gray-light); margin:2px 0 0;}
  .expense-row .cost-wrap{width:124px; position:relative;}
  .expense-row .cost-wrap input{width:100%; background:#fff; border:1px solid var(--input-border); border-radius:12px;
    padding:8px 10px 8px 28px; font-size:13px; color:var(--navy); outline:none; font-family:inherit;}
  .expense-row .cost-wrap .sym{position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:13px; color:#8c8c8c; pointer-events:none;}
  .del-btn{margin-left:8px; background:none; border:none; cursor:pointer; color:var(--gray-light); padding:4px; display:flex;}
  .del-btn svg{width:17px; height:17px;}

  .suggestion-panel{border-radius:16px; padding:14px 16px; margin-bottom:10px; border:1px solid var(--border); background:var(--soft-bg);}
  .suggestion-panel .sug-label{font-size:10.5px; font-weight:500; text-transform:uppercase; letter-spacing:1px; color:var(--gray-light); margin:0;}
  .suggestion-panel .sug-top{display:flex; align-items:center; justify-content:space-between; margin-top:4px;}
  .suggestion-panel .sug-name{font-size:14px; font-weight:600; color:var(--navy); flex:1; padding-right:8px;}
  .suggestion-panel .sug-cost{font-size:13px; font-weight:600; color:var(--navy);}
  .suggestion-panel .sug-freq{font-size:11.5px; color:var(--gray-mid); margin:2px 0 0;}
  .sug-actions{display:flex; align-items:center; margin-top:12px;}
  .add-plan-btn{background:var(--blue); color:#fff; border:none; border-radius:12px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer;}
  .skip-btn{background:none; border:none; margin-left:16px; color:var(--gray-light); font-size:13px; font-weight:500; cursor:pointer;}
  .sug-left{margin-left:auto; font-size:11.5px; color:var(--gray-light);}

  .empty-hint{padding:16px 0; text-align:center; font-size:13px; color:var(--gray-light);}

  .annual-total{display:flex; align-items:center; justify-content:space-between; border-radius:16px; padding:12px 16px; margin-top:4px; background:var(--soft-bg);}
  .annual-total .lbl{font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:1px; color:var(--gray-mid);}
  .annual-total .val{font-size:15px; font-weight:700; color:var(--navy);}

  .expense-actions{display:flex; align-items:center; gap:12px; margin-top:12px;}
  .add-expense-btn{flex:1; display:flex; align-items:center; justify-content:center; gap:6px; border:1px solid var(--input-border);
    border-radius:16px; padding:12px; background:#fff; cursor:pointer; color:var(--blue); font-size:13.5px; font-weight:600;}
  .add-expense-btn svg{width:16px; height:16px;}
  .clear-all-btn{background:none; border:none; color:var(--gray-light); font-size:12.5px; font-weight:500; padding:8px; cursor:pointer;}

  /* ---- results ---- */
  .capital-hero{padding:16px;}
  .capital-hero .lbl{font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:1px; color:var(--gray-light); margin:0;}
  .capital-hero .amount{font-size:34px; line-height:40px; font-weight:700; color:var(--blue); margin:4px 0 0;}
  .capital-hero .desc{font-size:13.5px; color:var(--navy); margin:8px 0 0; line-height:20px;}
  .capital-hero .desc b{color:var(--blue); font-weight:700;}
  .capital-hero .desc b.g{color:var(--green);}

  .stat-strip{display:flex; border-top:1px solid var(--border);}
  .stat-strip .stat{flex:1; text-align:center; padding:12px 4px; border-right:1px solid var(--border);}
  .stat-strip .stat:last-child{border-right:none;}
  .stat-strip .stat .lbl{font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:1px; color:var(--gray-light); margin:0;}
  .stat-strip .stat .val{font-size:13px; font-weight:600; color:var(--navy); margin:2px 0 0;}

  .showcalc-toggle{display:flex; align-items:center; justify-content:center; gap:4px; width:100%; background:none; border:none;
    margin-top:12px; cursor:pointer; color:var(--blue); padding:6px;}
  .showcalc-toggle span{font-size:12.5px; font-weight:500;}
  .showcalc-toggle svg{width:15px; height:15px;}

  .calc-breakdown{padding:16px; margin-top:8px;}
  .calc-row{display:flex; align-items:center; justify-content:between; justify-content:space-between; padding:4px 0; font-size:12.5px;}
  .calc-row .l{color:var(--gray-mid);}
  .calc-row .v{color:var(--navy); font-weight:500;}
  .calc-row.bold .l{color:var(--navy); font-weight:600;}
  .calc-row.bold .v{font-weight:700;}
  .calc-divider{height:1px; background:#F1F4F8; margin:6px 0;}
  .calc-formula{font-size:11px; color:var(--gray-light); margin-top:8px;}

  .progress-card{padding:16px; margin-top:12px;}
  .progress-card .lbl{font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:1px; color:var(--gray-light); margin:0;}
  .progress-card .val{font-size:20px; line-height:24px; font-weight:700; color:var(--navy); margin:4px 0 0;}
  .progress-track{height:10px; border-radius:999px; margin-top:12px; overflow:hidden; background:var(--progress-bg);}
  .progress-fill{height:10px; border-radius:999px; background:var(--green); transition:width .4s ease;}
  .progress-status{margin-top:8px;}
  .progress-status .reached{font-size:13px; font-weight:600; color:var(--green); margin:0;}
  .progress-status .reached-sub{font-size:12px; color:var(--gray-mid); margin:2px 0 0;}
  .progress-status .partial{display:flex; align-items:center; justify-content:space-between;}
  .progress-status .partial .pct{font-size:12.5px; font-weight:600; color:var(--green);}
  .progress-status .partial .gap{font-size:12.5px; color:var(--gray-mid);}
  .progress-card .cta-btn{margin-top:16px;}

  /* ---- bottom sheets ---- */
  .sheet-backdrop{position:absolute; inset:0; background:rgba(0,0,0,.4); z-index:500; display:flex; align-items:flex-end;
    animation:fadeIn .15s ease-out;}
  @keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
  .sheet-panel{width:100%; background:#fff; border-radius:24px 24px 0 0; max-height:82%; overflow-y:auto;
    animation:slideUp .22s cubic-bezier(.2,.8,.2,1);}
  @keyframes slideUp{from{transform:translateY(100%);} to{transform:translateY(0);}}
  .sheet-head{display:flex; align-items:center; justify-content:space-between; padding:20px 20px 12px;}
  .sheet-head h3{font-size:18px; font-weight:600; color:var(--navy); margin:0;}
  .sheet-close{width:32px; height:32px; border-radius:999px; background:#F0F2F6; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--gray-mid);}
  .sheet-close svg{width:16px; height:16px;}
  .sheet-body{padding:0 20px 24px;}

  .option-card{display:flex; align-items:center; justify-content:space-between; border-radius:16px; border:1px solid var(--input-border);
    padding:14px 16px; margin-bottom:10px; cursor:pointer; background:#fff;}
  .option-card.selected{border-color:var(--blue); background:var(--tint-blue);}
  .option-card .opt-label{font-size:15px; font-weight:600; color:var(--navy);}
  .option-card.selected .opt-label{color:var(--blue);}
  .option-card .opt-hint{font-size:12px; color:var(--gray-light); margin-top:2px;}
  .option-card svg{width:18px; height:18px; color:var(--blue);}

  .freq-pills{display:flex; flex-wrap:wrap; gap:8px;}
  .freq-pill{border-radius:16px; border:1px solid var(--input-border); padding:8px 14px; background:#fff; cursor:pointer; font-size:13px; font-weight:500; color:var(--gray-mid);}
  .freq-pill.selected{border-color:var(--blue); background:var(--tint-blue); color:var(--blue); font-weight:600;}

  /* ---- toast ---- */
  .toast{position:absolute; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:var(--navy); color:#fff;
    font-size:13px; font-weight:500; padding:12px 18px; border-radius:14px; max-width:86%; text-align:center; z-index:900;
    opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease; box-shadow:0 10px 24px rgba(10,31,68,.3);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .flex-1{flex:1;}
</style>
</head>
<body>
<div class="stage">
  <div class="topbar">
    <div>
      <h1>Perccent — My Wealth demo</h1>
      <p>Cloned UI · pre-filled dummy data · fully interactive flow</p>
    </div>
    <button class="reset-btn" onclick="resetDemo()">Reset demo</button>
  </div>

  <div class="phone-bezel">
    <div class="phone-notch"></div>
    <div class="screen">
      <div class="statusbar"><span>9:41</span><span>●●●●</span></div>
      <div class="screen-scroll" id="screen"></div>
      <div class="navbar" id="navbar" style="display:none;"></div>
      <div class="toast" id="toast"></div>
    </div>
  </div>
</div>

<script>
/* ============================== ICONS ============================== */
const ICONS = {
  download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  calculator: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>',
  chevronRight: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>',
  chevronLeft: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
  chevronDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>',
  chevronUp: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',

/* ============================== CALC UTILS ============================== */
function monthlyEquivalent(cost, frequency) {
  switch (frequency) {
    case 'monthly': return cost;
    case 'quarterly': return cost / 3;
    case 'half-yearly': return cost / 6;
    case 'yearly': return cost / 12;
    default: return 0;
  }
}
function annualTotal(item) {
  if (item.frequency === 'one-time') return item.cost;
  return monthlyEquivalent(item.cost, item.frequency) * 12;
}
function computeWealth(items, runwayMonths, launchMonths) {
  const setup = items.filter(i => i.frequency === 'one-time').reduce((s, i) => s + (Number(i.cost) || 0), 0);
  const monthlyBurn = items.reduce((s, i) => s + monthlyEquivalent(Number(i.cost) || 0, i.frequency), 0);
  const operatingCost = monthlyBurn * runwayMonths;
  const contingency = 0.15 * (setup + operatingCost);
  const totalCapital = setup + operatingCost + contingency;
  const saveMonthly = launchMonths > 0 ? totalCapital / launchMonths : totalCapital;
  return { setup, monthlyBurn, operatingCost, contingency, totalCapital, saveMonthly };
}
function formatINR(n) {
  const rounded = Math.round(n || 0);
  const negative = rounded < 0;
  const s = String(Math.abs(rounded));
  let grouped;
  if (s.length <= 3) { grouped = s; }
  else {
    const last3 = s.slice(-3);
    const rest = s.slice(0, -3).replace(/\B(?=(\d{2})+(?!\d))/g, ',');
    grouped = rest + ',' + last3;
  }
  return (negative ? '-' : '') + '₹' + grouped;
}
function trimNum(x) {

  const v = Math.round(n || 0);
  if (Math.abs(v) >= 1e7) return '₹' + trimNum(v / 1e7) + ' Cr';
  if (Math.abs(v) >= 1e5) return '₹' + trimNum(v / 1e5) + ' L';
  return formatINR(v);
}
function pluralMonths(n) { return n + ' ' + (n === 1 ? 'month' : 'months'); }
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function readyByLabel(launchMonths) {
  const d = new Date();
  d.setMonth(d.getMonth() + launchMonths);
  return MONTHS_SHORT[d.getMonth()] + ' ' + d.getFullYear();
}

/* ============================== RENDER CORE ============================== */
function render() {
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = (active && typeof active.selectionStart === 'number') ? active.selectionStart : null;
  const selEnd = (active && typeof active.selectionEnd === 'number') ? active.selectionEnd : null;
  const scrollEl = document.getElementById('screen');
  const prevScrollTop = scrollEl ? scrollEl.scrollTop : 0;
  const isScreenSwitch = render._lastScreen !== state.screen;
  render._lastScreen = state.screen;

  const root = document.getElementById('screen');
  let html = state.screen === 'mywealth' ? renderMyWealthScreen() : renderCalculatorScreen();
  if (state.activeSheet) html += renderSheet();
  root.innerHTML = html;

  const navbar = document.getElementById('navbar');
  if (state.screen === 'mywealth') {
    navbar.style.display = 'flex';
    navbar.innerHTML = navBarHTML();
  } else {
    navbar.style.display = 'none';
    navbar.innerHTML = '';
  }

  if (isScreenSwitch) {
    root.scrollTop = 0;
  } else {
    root.scrollTop = prevScrollTop;
  }

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
      el.focus();
      if (selStart !== null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
      }
    }
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 2600);
}

  const digits = raw.replace(/[^0-9]/g, '');

  if (inputEl && inputEl.value !== digits) {
    const pos = inputEl.selectionStart;
    inputEl.value = digits;
    try { inputEl.setSelectionRange(pos, pos); } catch (e) {}
  }

  const item = state.items.find(i => i.id === id);
  const metaEl = document.getElementById('item-meta-' + id);
  if (metaEl && item) metaEl.textContent = frequencyLabel(item.frequency) + ' · ' + formatINR(annualTotal(item)) + '/yr';

  const annualSum = state.items.reduce((sum, i) => sum + annualTotal(i), 0);
  const totalEl = document.getElementById('annual-total-value');
  if (totalEl) totalEl.textContent = formatINR(annualSum);

  const resultsEl = document.getElementById('results-section');
  if (resultsEl) {
    const result = computeWealth(state.items, state.runwayMonths, state.launchMonths);
    resultsEl.outerHTML = resultsSectionHTML(result);
  }
}
function deleteItem(id) {
  state.items = state.items.filter(i => i.id !== id);

function clearAll() {

function acceptSuggestion() {
  const s = state.queue[0];

  state.reviewedCount++;

function skipSuggestion() {

  state.queue = state.queue.slice(1);

}

    case 'addExpense':
      return sheetShellHTML('Add expense', addExpenseBodyHTML());
    default:
      return '';
  }
}

function selectCategory(id) {
  state.category = id;
  state.items = [];
  state.queue = getSuggestedExpenses(id);
  state.reviewedCount = 0;
  state.activeSheet = null;
  render();
}
function selectLaunch(v) {
  if (v === 'custom') { state.isCustomLaunch = true; }
  else { state.isCustomLaunch = false; state.launchMonths = Number(v); }
  state.activeSheet = null;
  render();
}
function selectRunway(v) { state.runwayMonths = Number(v); state.activeSheet = null; render(); }
function selectPortfolioMode(v) { state.mode = v; state.activeSheet = null; render(); }

/* ---- add-expense sheet ---- */
function openAddExpenseSheet() {
  state.addExpense = { name: '', cost: '', frequency: 'monthly' };
  state.activeSheet = 'addExpense';
  render();
}
function addExpenseBodyHTML() {
  const ae = state.addExpense;
  const numericCost = Number((ae.cost || '').replace(/[^0-9]/g, ''));
  const canSubmit = ae.name.trim().length > 0 && numericCost > 0;
  const pills = FREQUENCY_OPTIONS.map(f => `
    <button class="freq-pill ${f === ae.frequency ? 'selected' : ''}" data-freq="${f}" onclick="setAddExpenseFrequency('${f}')">${frequencyLabel(f)}</button>
  `).join('');
  return `
    <div class="field">
      <label>Expense name</label>
      <input type="text" id="input-add-name" placeholder="e.g. Rent" value="${escapeAttr(ae.name)}" oninput="updateAddExpenseName(this.value)" />
    </div>
    <div class="field">
      <label>Cost</label>
      <div class="currency-wrap">
        <span class="sym">₹</span>
        <input type="text" inputmode="numeric" id="input-add-cost" placeholder="0" value="${escapeAttr(ae.cost)}" oninput="updateAddExpenseCost(this.value)" />
      </div>
    </div>
    <div class="field" style="margin-bottom:20px;">
      <label>Frequency</label>
      <div class="freq-pills">${pills}</div>
    </div>
    <button class="cta-btn ${canSubmit ? '' : 'disabled'}" onclick="submitAddExpense()" id="add-expense-submit">Add to plan</button>`;
}
function refreshAddExpenseSubmit() {
  const ae = state.addExpense;
  const numericCost = Number((ae.cost || '').replace(/[^0-9]/g, ''));
  const canSubmit = ae.name.trim().length > 0 && numericCost > 0;
  const btn = document.getElementById('add-expense-submit');
  if (btn) btn.classList.toggle('disabled', !canSubmit);
}
function updateAddExpenseName(v) { state.addExpense.name = v; refreshAddExpenseSubmit(); }
function updateAddExpenseCost(v) {
  const digits = v.replace(/\D/g, '');
  state.addExpense.cost = digits;
  const inputEl = document.getElementById('input-add-cost');
  if (inputEl && inputEl.value !== digits) {
    const pos = inputEl.selectionStart;
    inputEl.value = digits;
    try { inputEl.setSelectionRange(pos, pos); } catch (e) {}
  }
  refreshAddExpenseSubmit();
}
function setAddExpenseFrequency(f) {
  state.addExpense.frequency = f;
  document.querySelectorAll('.freq-pill').forEach(pill => {
    pill.classList.toggle('selected', pill.getAttribute('data-freq') === f);
  });
}
function submitAddExpense() {
  const ae = state.addExpense;
  const numericCost = Number((ae.cost || '').replace(/[^0-9]/g, ''));
  if (!(ae.name.trim().length > 0 && numericCost > 0)) return;
  state.items = [...state.items, { name: ae.name.trim(), cost: numericCost, frequency: ae.frequency, id: nextId() }];
  state.activeSheet = null;
  state.addExpense = null;
  render();
  showToast('Expense added to plan.');
}

/* ============================== INIT ============================== */
state = defaultState();
render();
</script>
</body>
</html>
